# Fly.io 部署配置
app = "task-panel"
primary_region = "hkg"

[build]
  builder = "npm"

[env]
  PORT = "3456"
  DB_PATH = "/data/tasks.db"

[[services]]
  protocol = "tcp"
  internal_port = 3456
  force_https = true

  [[services.ports]]
    port = 443
    handlers = ["http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

[mounts]
  source = "tasks_data"
  destination = "/data"

[http_service]
  internal_port = 3456
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 0
